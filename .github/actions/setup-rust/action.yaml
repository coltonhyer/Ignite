name: "Setup Rust"
description: "Install Rust toolchain with optional components and enable dependency caching"

inputs:
  components:
    description: "Comma-separated list of components (e.g., clippy, rustfmt)"
    required: false
    default: ""
  targets:
    description: "Comma-separated target architectures"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev libglib2.0-dev libxdo-dev

    - uses: dtolnay/rust-toolchain@stable
      with:
        components: ${{ inputs.components }}
        targets: ${{ inputs.targets }}

    - uses: Swatinem/rust-cache@v2